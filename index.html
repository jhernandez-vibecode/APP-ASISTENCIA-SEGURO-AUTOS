<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asistencia Seguro Automóviles</title>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome para los íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para que el navegador entienda React -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Animaciones para transiciones fluidas */
    @keyframes slideInFromBottom {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInFromRight {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-in-bottom {
      animation: slideInFromBottom 0.3s ease-out forwards;
    }
    .animate-in-right {
      animation: slideInFromRight 0.3s ease-out forwards;
    }
    body {
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [currentView, setCurrentView] = useState('home');

      const navigateTo = (view) => {
        setCurrentView(view);
        window.scrollTo(0, 0);
      };

      const renderHeader = () => (
        <header className="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50">
          <div className="max-w-md mx-auto flex items-center justify-between">
            <div className="flex items-center">
              {currentView !== 'home' && (
                <button onClick={() => navigateTo('home')} className="p-1 hover:bg-blue-800 rounded px-2 mr-2 transition-colors">
                  <i className="fa-solid fa-chevron-left text-xl"></i>
                </button>
              )}
              {/* Aquí se integra el logo del INS */}
              <img 
                src="INS BLANCO.png" 
                alt="INS" 
                className="h-7 sm:h-8 object-contain" 
                onError={(e) => { e.target.style.display = 'none'; }} 
              />
            </div>
            
            <h1 className="text-xs sm:text-sm font-bold text-right flex-1 leading-tight px-2">
              {currentView === 'home' ? 'Asistencia Seguro Automóviles' : 
               currentView === 'accidente' ? 'Reporte de Accidente' : 
               currentView === 'vial' ? 'Asistencia Vial' : 
               currentView === 'robo' ? 'Robo Total / Parcial' :
               currentView === 'coberturaH' ? 'Vandalismo / Naturaleza' :
               'Contactos Oficiales'}
            </h1>
            <button onClick={() => navigateTo('contactos')} className="p-1 hover:bg-blue-800 rounded pl-2 transition-colors">
              <i className="fa-solid fa-phone text-xl"></i>
            </button>
          </div>
        </header>
      );

      const renderHome = () => (
        <div className="p-4 max-w-md mx-auto space-y-4 animate-in-bottom">
          
          {/* CUADRO CAMBIADO A AZUL (NEUROMARKETING: SEGURIDAD Y CALMA) */}
          <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-xl shadow-sm">
            <div className="flex items-center text-blue-800 font-bold mb-1 text-base">
              <i className="fa-solid fa-circle-info text-xl mr-2"></i>
              ¿Tienes una emergencia?
            </div>
            <p className="text-sm text-blue-900 leading-relaxed">Selecciona el tipo de asistencia que necesitas en el territorio nacional para guiarte paso a paso.</p>
          </div>

          <button 
            onClick={() => navigateTo('accidente')}
            className="w-full bg-red-50 border border-red-200 p-4 rounded-2xl shadow-sm hover:bg-red-100 hover:shadow-md transition-all active:scale-95 flex items-center space-x-4 text-left"
          >
            <div className="bg-red-500 text-white rounded-full flex-shrink-0 w-14 h-14 flex items-center justify-center shadow-sm">
              <i className="fa-solid fa-car-burst text-2xl"></i>
            </div>
            <div>
              <h2 className="text-base font-extrabold text-red-900">Accidente de Tránsito</h2>
              <p className="text-xs text-red-700 mt-1 font-medium">Reporte de choques y guía para el Pacto Amistoso.</p>
            </div>
          </button>

          <button 
            onClick={() => navigateTo('vial')}
            className="w-full bg-orange-50 border border-orange-200 p-4 rounded-2xl shadow-sm hover:bg-orange-100 hover:shadow-md transition-all active:scale-95 flex items-center space-x-4 text-left"
          >
            <div className="bg-orange-500 text-white rounded-full flex-shrink-0 w-14 h-14 flex items-center justify-center shadow-sm">
              <i className="fa-solid fa-screwdriver-wrench text-2xl"></i>
            </div>
            <div>
              <h2 className="text-base font-extrabold text-orange-900">Asistencia Vial (Avería)</h2>
              <p className="text-xs text-orange-700 mt-1 font-medium">Grúa, cerrajería, batería, llanta o traslado al aeropuerto.</p>
            </div>
          </button>

          <button 
            onClick={() => navigateTo('robo')}
            className="w-full bg-purple-50 border border-purple-200 p-4 rounded-2xl shadow-sm hover:bg-purple-100 hover:shadow-md transition-all active:scale-95 flex items-center space-x-4 text-left"
          >
            <div className="bg-purple-600 text-white rounded-full flex-shrink-0 w-14 h-14 flex items-center justify-center shadow-sm">
              <i className="fa-solid fa-shield text-2xl"></i>
            </div>
            <div>
              <h2 className="text-base font-extrabold text-purple-900">Robo Total o Parcial</h2>
              <p className="text-xs text-purple-700 mt-1 font-medium">Denuncia ante OIJ, traslados y trámites con el INS.</p>
            </div>
          </button>

          <button 
            onClick={() => navigateTo('coberturaH')}
            className="w-full bg-teal-50 border border-teal-200 p-4 rounded-2xl shadow-sm hover:bg-teal-100 hover:shadow-md transition-all active:scale-95 flex items-center space-x-4 text-left"
          >
            <div className="bg-teal-500 text-white rounded-full flex-shrink-0 w-14 h-14 flex items-center justify-center shadow-sm">
              <i className="fa-solid fa-cloud-showers-heavy text-2xl"></i>
            </div>
            <div>
              <h2 className="text-base font-extrabold text-teal-900">Vandalismo / Cobertura H</h2>
              <p className="text-xs text-teal-700 mt-1 font-medium">Rayonazos, inundaciones, huracanes, caída de árboles.</p>
            </div>
          </button>
          
          <button 
            onClick={() => navigateTo('contactos')}
            className="w-full bg-green-50 border border-green-200 p-4 rounded-2xl shadow-sm hover:bg-green-100 hover:shadow-md transition-all active:scale-95 flex items-center space-x-4 text-left"
          >
            <div className="bg-green-600 text-white rounded-full flex-shrink-0 w-14 h-14 flex items-center justify-center shadow-sm">
              <i className="fa-solid fa-phone text-2xl"></i>
            </div>
            <div>
              <h2 className="text-base font-extrabold text-green-900">Directorio de Contactos</h2>
              <p className="text-xs text-green-700 mt-1 font-medium">Números directos de atención 24/7 en Costa Rica.</p>
            </div>
          </button>
        </div>
      );

      const renderAccidente = () => (
        <div className="p-4 max-w-md mx-auto space-y-6 animate-right">
          <div className="bg-white border-2 border-red-100 rounded-2xl p-5 shadow-sm">
            <h3 className="font-bold flex items-center mb-2 text-lg text-red-600">
              <i className="fa-solid fa-triangle-exclamation mr-2"></i> Paso 1: Reporte Inmediato
            </h3>
            <p className="text-sm text-slate-700 mb-4">Si tuvo un choque, <strong>¡NO MUEVA EL VEHÍCULO!</strong> (a menos que aplique Pacto Amistoso).</p>
            <a href="tel:8008008000" className="flex items-center justify-center bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl shadow-md active:scale-95 transition-all text-xl">
              <i className="fa-solid fa-phone mr-2"></i> 800-800-8000
            </a>
          </div>

          <div className="bg-white border border-blue-200 rounded-2xl shadow-sm overflow-hidden">
            <div className="bg-blue-50 px-4 py-3 border-b border-blue-100">
              <h3 className="font-bold text-blue-900 flex items-center">
                <i className="fa-solid fa-shield-halved text-xl mr-2 text-blue-600"></i> ¿Aplica Pacto Amistoso?
              </h3>
            </div>
            <div className="p-4 space-y-4">
              <p className="text-sm text-gray-600">Puedes mover el vehículo sin esperar al Oficial de Tránsito SI se cumplen <strong>TODAS</strong> estas condiciones:</p>
              <ul className="text-sm text-gray-700 space-y-2 bg-gray-50 p-3 rounded border border-gray-100">
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> Ambos conductores <strong>están de acuerdo</strong> en hacer el arreglo.</li>
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> No hay lesionados ni fallecidos.</li>
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> No hay bicicletas, motos ni peatones involucrados.</li>
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> Ambos vehículos están asegurados y al día.</li>
              </ul>
              
              <div className="border border-blue-200 bg-blue-50 p-3 rounded-lg">
                <h4 className="font-bold text-sm mb-2 text-blue-900 flex items-center"><i className="fa-solid fa-camera mr-2"></i> Pasos para el Pacto:</h4>
                <ol className="text-sm text-blue-800 list-decimal pl-5 space-y-2">
                  <li>Llamar al <strong>800-800-8000</strong> e indicar que desean realizar un Pacto Amistoso.</li>
                  <li>Grabar un <strong>pequeño video 360°</strong> de la escena completa del evento.</li>
                  <li>Tomar las siguientes fotografías:
                    <ul className="list-disc pl-4 mt-1 text-xs space-y-1 text-blue-700">
                      <li>1 foto de cada costado de los vehículos.</li>
                      <li>3 fotos de los daños de cada vehículo.</li>
                      <li>2 fotos panorámicas de la escena y posición.</li>
                    </ul>
                  </li>
                </ol>
                <p className="text-xs font-bold text-blue-900 mt-3 border-t border-blue-200 pt-2">Luego de documentar todo, mueve el vehículo a un lugar seguro y espera al inspector del INS.</p>
              </div>
            </div>
          </div>

          <div className="bg-white border border-red-200 rounded-lg shadow-sm overflow-hidden">
            <div className="bg-red-100 px-4 py-3 border-b border-red-200">
              <h3 className="font-bold text-red-900 flex items-center">
                <i className="fa-solid fa-triangle-exclamation text-xl mr-2"></i> Si NO aplica el Pacto Amistoso
              </h3>
            </div>
            <div className="p-4">
              <ul className="space-y-3 text-sm text-gray-800">
                <li className="flex items-start font-bold text-red-700">
                  <span className="bg-red-200 text-red-900 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2 flex-shrink-0">1</span>
                  ¡NO MOVER LOS VEHÍCULOS!
                </li>
                <li className="flex items-start">
                  <span className="bg-red-200 text-red-900 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2 flex-shrink-0">2</span>
                  Llamar a la Policía de Tránsito (117 o 911) para que confeccionen el parte oficial.
                </li>
                <li className="flex items-start">
                  <span className="bg-red-200 text-red-900 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2 flex-shrink-0">3</span>
                  Llamar al INS (800-800-8000) y esperar al inspector en la escena.
                </li>
              </ul>
            </div>
          </div>

          <div className="bg-white border rounded-lg shadow-sm overflow-hidden">
            <div className="bg-gray-100 px-4 py-3 border-b">
              <h3 className="font-bold text-gray-800 flex items-center">
                <i className="fa-solid fa-clock text-xl mr-2 text-gray-600"></i> Trámites Posteriores
              </h3>
            </div>
            <div className="p-4">
              <ul className="space-y-3 text-sm text-gray-700">
                <li className="flex items-start">
                  <div className="bg-gray-200 text-gray-700 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 flex-shrink-0">1</div>
                  <span>Si no pudiste llamar al momento (Fuerza Mayor), tienes <strong>7 días hábiles</strong> para formalizar el aviso por escrito.</span>
                </li>
                <li className="flex items-start">
                  <div className="bg-gray-200 text-gray-700 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 flex-shrink-0">2</div>
                  <span>Tienes <strong>10 días hábiles</strong> tras el evento para llevar el vehículo a un Centro de Estimación de Daños (CED).</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      );

      const renderVial = () => (
        <div className="p-4 max-w-md mx-auto space-y-6 animate-right">
          <div className="bg-white border-2 border-orange-100 rounded-2xl p-5 shadow-sm">
            <h3 className="font-bold flex items-center mb-2 text-lg text-orange-600">
              <i className="fa-solid fa-truck-pickup mr-2"></i> Asistencia en Carretera
            </h3>
            <p className="text-sm text-slate-700 mb-4">Disponible para averías mecánicas, falta de combustible o llanta pinchada.</p>
            <a href="tel:8008008001" className="flex items-center justify-center bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl shadow-md active:scale-95 transition-all text-xl">
              <i className="fa-solid fa-phone mr-2"></i> 800-800-8001
            </a>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
            <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Servicios Disponibles</h3>
            <ul className="space-y-4 text-sm text-gray-700">
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-orange-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span><strong>Remolque y Básicos:</strong> Grúa por avería mecánica, envío de combustible, cambio de llanta estallada, paso de corriente y cerrajería.</span>
              </li>
              <li className="flex items-start bg-blue-50 p-3 rounded-lg border border-blue-100">
                <i className="fa-solid fa-plane text-xl text-blue-600 mr-2 mt-1 flex-shrink-0"></i>
                <div>
                  <span className="font-bold text-blue-900 block mb-1">Taxi al Aeropuerto</span>
                  <span className="text-blue-800">Beneficio de 2 traslados al año. Cada traslado incluye taxi de ida y regreso.</span>
                  <p className="text-xs text-blue-600 font-semibold mt-1">* Aplica únicamente para vehículos con una antigüedad no mayor a 6 años.</p>
                </div>
              </li>
            </ul>
            <p className="text-xs text-gray-400 mt-5 italic border-t pt-3">* Los límites de eventos y distancias de grúa/asistencias dependen del plan contratado (Limitado, Básico o Plus).</p>
          </div>
        </div>
      );

      const renderRobo = () => (
        <div className="p-4 max-w-md mx-auto space-y-6 animate-right">
          <div className="bg-indigo-600 text-white rounded-2xl p-5 shadow-lg text-center">
            <i className="fa-solid fa-shield-virus text-5xl mb-3 opacity-50"></i>
            <h3 className="font-bold text-lg mb-2">Protocolo de Robo</h3>
            <p className="text-sm opacity-90">Reporte inmediato obligatorio ante autoridades e INS.</p>
          </div>

          <div className="space-y-3">
            <a href="tel:911" className="block bg-slate-800 hover:bg-slate-700 text-white text-center py-4 rounded-xl font-bold text-lg shadow-md active:scale-95 transition-all">
              <i className="fa-solid fa-building-shield mr-2"></i> 1. Reportar al OIJ (911)
            </a>
            <a href="tel:8008008000" className="block bg-green-600 hover:bg-green-500 text-white text-center py-4 rounded-xl font-bold text-lg shadow-md active:scale-95 transition-all">
              <i className="fa-solid fa-phone mr-2"></i> 2. Reportar al INS
            </a>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm space-y-4">
            <h3 className="font-bold text-gray-800 mb-3 border-b pb-2">En caso de Robo Total</h3>
            <ul className="space-y-3 text-sm text-gray-700">
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span><strong>Beneficio de Transporte:</strong> Puedes llamar al <a href="tel:8008008001" className="text-blue-600 font-bold underline">800-800-8001</a> para solicitar un taxi que te lleve al OIJ a poner la denuncia y luego a tu residencia.</span>
              </li>
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span><strong>Trámite con el INS:</strong> A los 15 días hábiles de la denuncia, debes presentar al Instituto la certificación del OIJ donde conste que el vehículo no apareció.</span>
              </li>
            </ul>
          </div>

          <div className="bg-white border rounded-lg shadow-sm p-4">
            <h3 className="font-bold text-gray-800 mb-3 border-b pb-2">En caso de Robo Parcial</h3>
            <ul className="space-y-3 text-sm text-gray-700">
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span>Si el vehículo cuenta con descuento por dispositivo de seguridad (GPS/monitoreo), deberás comprobar que el mismo estaba activo al momento del robo.</span>
              </li>
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span>Si el vehículo aparece antes del pago de la indemnización, debes solicitar una inspección ocular del OIJ sobre los daños.</span>
              </li>
            </ul>
          </div>
        </div>
      );

      const renderCoberturaH = () => (
        <div className="p-4 max-w-md mx-auto space-y-6 animate-right">
          <div className="bg-teal-600 text-white rounded-2xl p-5 shadow-lg">
            <h3 className="font-bold flex items-center mb-2">
              <i className="fa-solid fa-cloud-bolt mr-2"></i> Riesgos Adicionales H
            </h3>
            <p className="text-sm opacity-90">Cubre eventos de la naturaleza y actos malintencionados.</p>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
            <h4 className="font-bold text-slate-800 mb-3">¿Qué incluye?</h4>
            <ul className="grid grid-cols-2 gap-3">
              {[
                { n: 'Inundación', i: 'fa-house-flood-water' },
                { n: 'Vandalismo', i: 'fa-mask' },
                { n: 'Temblor', i: 'fa-house-crack' },
                { n: 'Derrumbe', i: 'fa-mountain' },
                { n: 'Rayonazos', i: 'fa-car-side' },
                { n: 'Incendio', i: 'fa-fire' }
              ].map((item, idx) => (
                <li key={idx} className="flex flex-col items-center bg-teal-50 p-3 rounded-xl border border-teal-100 text-teal-900 text-center">
                  <i className={`fa-solid ${item.i} text-xl mb-1`}></i>
                  <span className="text-[10px] font-bold uppercase">{item.n}</span>
                </li>
              ))}
            </ul>
            <div className="mt-5 p-4 bg-slate-50 border border-slate-200 rounded-xl text-center">
              <p className="text-xs text-slate-600 leading-relaxed font-medium mb-3">
                <strong className="text-red-600">Importante:</strong> NO repare ni altere los daños. Reporte de inmediato al INS:
              </p>
              <a href="tel:8008008000" className="flex items-center justify-center bg-green-600 hover:bg-green-500 text-white font-black py-3 rounded-xl shadow-md active:scale-95 transition-all text-lg">
                <i className="fa-solid fa-phone mr-2"></i> 800-800-8000
              </a>
              <p className="text-[10px] text-slate-500 mt-3 uppercase font-bold tracking-wide">Tiene 10 días hábiles para valoración en CED</p>
            </div>
          </div>
        </div>
      );

      const renderContactos = () => (
        <div className="p-4 max-w-md mx-auto space-y-4 animate-right">
          <h2 className="text-xl font-black text-slate-800 mb-4 px-2">Directorio Oficial</h2>
          
          <div className="space-y-3">
            {[
              { label: 'Accidentes y Daños', num: '800-800-8000', color: 'bg-green-600', sub: 'Reporte inmediato 24/7' },
              { label: 'Asistencia Vial (Grúa)', num: '800-800-8001', color: 'bg-green-600', sub: 'Batería, cerrajero, etc.' },
              { label: 'Consultas Teleins', num: '800-835-3467', color: 'bg-green-600', sub: 'Información general' }
            ].map((c, i) => (
          
          <div className="space-y-3">
            <a href="tel:8008008000" className="block bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-colors">
              <div>
                <h3 className="font-bold text-gray-800 text-base">Reporte de Accidentes</h3>
                <p className="text-xs text-gray-500">Choques / Daños (24/7)</p>
              </div>
              <span className="bg-red-100 text-red-800 px-3 py-1.5 rounded-lg font-bold text-sm">800-800-8000</span>
            </a>

            <a href="tel:8008008001" className="block bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-colors">
              <div>
                <h3 className="font-bold text-gray-800 text-base">Asistencia Vial</h3>
                <p className="text-xs text-gray-500">Grúa, batería, cerrajero</p>
              </div>
              <span className="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-lg font-bold text-sm">800-800-8001</span>
            </a>

            <a href="tel:8008353467" className="block bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-colors">
              <div>
                <h3 className="font-bold text-gray-800 text-base">Consultas Generales</h3>
                <p className="text-xs text-gray-500">Línea Teleins</p>
              </div>
              <span className="bg-gray-100 text-gray-800 px-3 py-1.5 rounded-lg font-bold text-sm">800-8353467</span>
            </a>
          </div>
          
          <div className="mt-6 bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm text-gray-600 text-center shadow-inner">
            <i className="fa-solid fa-location-dot text-3xl mx-auto text-gray-400 mb-2"></i>
